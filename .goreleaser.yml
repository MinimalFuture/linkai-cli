version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: linkai
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/MinimalFuture/linkai-cli/cmd.version={{.Version}}
      - -X github.com/MinimalFuture/linkai-cli/cmd.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - README.zh.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

changelog:
  # Use GitHub's compare API so entries render as "message (#PR) by @author"
  # with proper links, instead of a flat list of raw commit lines.
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^style:'
      - '^refactor:'
      - 'Merge pull request'
      - 'Merge branch'
      - '^bump '
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

nfpms:
  - id: linkai-pkg
    package_name: linkai
    vendor: MinimalFuture
    homepage: https://github.com/MinimalFuture/linkai-cli
    maintainer: MinimalFuture <noreply@minimalfuture.dev>
    description: LinkAI platform CLI
    formats:
      - deb
      - rpm
    bindir: /usr/bin

homebrew_casks:
  - name: linkai
    binaries:
      - linkai
    # Auto-skip when HOMEBREW_TAP_GITHUB_TOKEN is unset, so first-time releases
    # work before the homebrew-tap repo + PAT are provisioned.
    skip_upload: '{{ if and (isEnvSet "HOMEBREW_TAP_GITHUB_TOKEN") (ne (index .Env "HOMEBREW_TAP_GITHUB_TOKEN") "") }}false{{ else }}true{{ end }}'
    repository:
      owner: MinimalFuture
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/MinimalFuture/linkai-cli
    description: LinkAI platform CLI

release:
  footer: |
    ## Install

    ```bash
    npm i -g linkai-cli                                      # npm
    curl -fsSL https://cdn.link-ai.tech/cli/install.sh | sh  # Linux/macOS
    ```

    <details><summary>Other install methods</summary>

    ```bash
    irm https://cdn.link-ai.tech/cli/install.ps1 | iex       # Windows (PowerShell)
    brew install --cask MinimalFuture/tap/linkai            # Homebrew
    go install github.com/MinimalFuture/linkai-cli@latest    # Go
    ```
    </details>

    ---
    **Full docs:** [README](https://github.com/MinimalFuture/linkai-cli#readme) · **All changes:** {{ .PreviousTag }}...{{ .Tag }}
