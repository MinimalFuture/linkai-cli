version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: linkai
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/MinimalFuture/linkai-cli/cmd.version={{.Version}}
      - -X github.com/MinimalFuture/linkai-cli/cmd.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - README.zh.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

nfpms:
  - id: linkai-pkg
    package_name: linkai
    vendor: MinimalFuture
    homepage: https://github.com/MinimalFuture/linkai-cli
    maintainer: MinimalFuture <noreply@minimalfuture.dev>
    description: LinkAI platform CLI
    formats:
      - deb
      - rpm
    bindir: /usr/bin

homebrew_casks:
  - name: linkai
    binaries:
      - linkai
    # Auto-skip when HOMEBREW_TAP_GITHUB_TOKEN is unset, so first-time releases
    # work before the homebrew-tap repo + PAT are provisioned.
    skip_upload: '{{ if and (isEnvSet "HOMEBREW_TAP_GITHUB_TOKEN") (ne (index .Env "HOMEBREW_TAP_GITHUB_TOKEN") "") }}false{{ else }}true{{ end }}'
    repository:
      owner: MinimalFuture
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/MinimalFuture/linkai-cli
    description: LinkAI platform CLI

release:
  header: |
    ## Install

    **npm (recommended):**
    ```
    npm i -g linkai-cli
    ```

    **One-liner (Linux/macOS):**
    ```
    curl -fsSL https://cdn.link-ai.tech/cli/install.sh | sh
    ```

    **Windows (PowerShell):**
    ```
    irm https://cdn.link-ai.tech/cli/install.ps1 | iex
    ```

    **Homebrew:**
    ```
    brew install --cask MinimalFuture/tap/linkai
    ```

    **Go:**
    ```
    go install github.com/MinimalFuture/linkai-cli@latest
    ```
