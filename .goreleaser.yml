version: 2

before:
  hooks:
    - go mod tidy
    # Runs after --clean wipes ./dist, so these extra release assets survive.
    - mkdir -p dist
    # Agent skill archive (fetched by install.sh / install.ps1 and the CDN).
    - sh -c 'tar -C skills -czf dist/linkai-cli-skill.tar.gz linkai-cli'
    # Plain-text pointer to the current version, so the CDN installer can
    # resolve "latest" without a releases API.
    - sh -c 'printf "%s" "{{ .Tag }}" > dist/latest.txt'

builds:
  - main: .
    binary: linkai
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/MinimalFuture/linkai-cli/cmd.version={{.Version}}
      - -X github.com/MinimalFuture/linkai-cli/cmd.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - README.zh.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

nfpms:
  - id: linkai-pkg
    package_name: linkai
    vendor: MinimalFuture
    homepage: https://github.com/MinimalFuture/linkai-cli
    maintainer: MinimalFuture <noreply@minimalfuture.dev>
    description: LinkAI platform CLI
    formats:
      - deb
      - rpm
    bindir: /usr/bin

brews:
  - name: linkai
    # Auto-skip when HOMEBREW_TAP_GITHUB_TOKEN is unset, so first-time releases
    # work before the homebrew-tap repo + PAT are provisioned.
    skip_upload: '{{ if eq .Env.HOMEBREW_TAP_GITHUB_TOKEN "" }}true{{ else }}false{{ end }}'
    repository:
      owner: MinimalFuture
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/MinimalFuture/linkai-cli
    description: LinkAI platform CLI
    install: |
      bin.install "linkai"
    test: |
      system "#{bin}/linkai", "--version"

release:
  header: |
    ## Install

    **npm (recommended):**
    ```
    npm i -g linkai-cli
    ```

    **One-liner (Linux/macOS):**
    ```
    curl -fsSL https://cdn.link-ai.tech/cli/install.sh | sh
    ```

    **Windows (PowerShell):**
    ```
    irm https://cdn.link-ai.tech/cli/install.ps1 | iex
    ```

    **Homebrew:**
    ```
    brew install MinimalFuture/tap/linkai
    ```

    **Go:**
    ```
    go install github.com/MinimalFuture/linkai-cli@latest
    ```
  # The agent skill archive and latest.txt are produced by the release workflow
  # (see .github/workflows/release.yml "Package skill" step) and uploaded here
  # so both the install script and the CDN sync can fetch them by name.
  extra_files:
    - glob: ./dist/linkai-cli-skill.tar.gz
    - glob: ./dist/latest.txt
