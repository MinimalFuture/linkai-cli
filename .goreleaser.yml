version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: linkai
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/MinimalFuture/linkai-cli/cmd.version={{.Version}}
      - -X github.com/MinimalFuture/linkai-cli/cmd.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - README.zh.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

changelog:
  # Use GitHub's compare API so entries carry the author's GitHub login (@user)
  # and PR links, instead of a flat list of raw commit lines.
  use: github
  sort: asc
  # Render each entry as a clickable short-hash link + message + author:
  #   [3b33114](https://github.com/OWNER/REPO/commit/<full-sha>) message (@login)
  # A bare hash is NOT auto-linked in release notes, so we build the markdown
  # link by hand: `substr 0 7 .SHA` for the display text, full `.SHA` for the
  # URL. `.Logins` (GitHub usernames, '@'-prefixed) is only populated in
  # `github` mode; on the very first release GoReleaser has no previous tag and
  # falls back to `git` mode, where `.Logins` is empty and the author is omitted.
  format: '[{{ slice .SHA 0 7 }}](https://github.com/MinimalFuture/linkai-cli/commit/{{ .SHA }}) {{ .Message }}{{ if .Logins }} ({{ .Logins | englishJoin }}){{ end }}'
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^style:'
      - '^refactor:'
      - 'Merge pull request'
      - 'Merge branch'
      - '^bump '
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

nfpms:
  - id: linkai-pkg
    package_name: linkai
    vendor: MinimalFuture
    homepage: https://github.com/MinimalFuture/linkai-cli
    maintainer: MinimalFuture <noreply@minimalfuture.dev>
    description: LinkAI platform CLI
    formats:
      - deb
      - rpm
    bindir: /usr/bin

homebrew_casks:
  - name: linkai
    binaries:
      - linkai
    # Auto-skip when HOMEBREW_TAP_GITHUB_TOKEN is unset, so first-time releases
    # work before the homebrew-tap repo + PAT are provisioned.
    skip_upload: '{{ if and (isEnvSet "HOMEBREW_TAP_GITHUB_TOKEN") (ne (index .Env "HOMEBREW_TAP_GITHUB_TOKEN") "") }}false{{ else }}true{{ end }}'
    repository:
      owner: MinimalFuture
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/MinimalFuture/linkai-cli
    description: LinkAI platform CLI

release:
  # Overwrite assets that already exist on the release instead of failing with a
  # 422 "already_exists". Makes re-running a release (e.g. after a later step
  # like the CDN sync failed) idempotent.
  mode: replace
  footer: |
    ## Install

    ```bash
    npm i -g linkai-cli                                      # npm
    curl -fsSL https://cdn.link-ai.tech/cli/install.sh | sh  # Linux/macOS
    ```

    <details><summary>Other install methods</summary>

    ```bash
    irm https://cdn.link-ai.tech/cli/install.ps1 | iex       # Windows (PowerShell)
    brew install --cask MinimalFuture/tap/linkai            # Homebrew
    go install github.com/MinimalFuture/linkai-cli@latest    # Go
    ```
    </details>

    ---
    **Full docs:** [README](https://github.com/MinimalFuture/linkai-cli#readme) · **All changes:** {{ .PreviousTag }}...{{ .Tag }}
