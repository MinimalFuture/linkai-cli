name: Release

on:
  push:
    tags:
      # Match both bare (0.1.0) and v-prefixed (v0.1.0) tags.
      - '[0-9]+.[0-9]+.[0-9]+*'
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. 0.1.0). Must already exist.'
        required: true

permissions:
  contents: write
  # Required for npm Trusted Publishing (OIDC): lets GitHub Actions mint a
  # short-lived ID token that npm trusts, so no long-lived NPM_TOKEN is needed.
  # npm validates the trusted-publisher config against THIS workflow filename
  # (release.yml), so the id-token permission must live here.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # HOMEBREW_TAP_GITHUB_TOKEN is still a classic secret (GitHub PAT, unaffected
    # by npm's token policy). npm publishing uses OIDC and needs no secret.
    env:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      # CDN mirror credentials (neutral names — no provider in the clear).
      # When unset, the "Sync artifacts to CDN" step is skipped.
      CDN_SECRET_ID: ${{ secrets.CDN_SECRET_ID }}
      CDN_SECRET_KEY: ${{ secrets.CDN_SECRET_KEY }}
      CDN_BUCKET: ${{ secrets.CDN_BUCKET }}
      CDN_REGION: ${{ secrets.CDN_REGION }}
      CDN_DOMAIN: ${{ secrets.CDN_DOMAIN }}
    steps:
      # Resolve the release tag from either trigger: a tag push exposes it as
      # github.ref_name; workflow_dispatch passes it as an input.
      - name: Resolve release tag
        id: rel
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Check out the exact tag so GoReleaser sees a clean tagged state
          # (required when triggered manually from a branch).
          ref: ${{ steps.rel.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # OIDC trusted publishing requires Node >= 22.14.0 and npm >= 11.5.1.
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      # Node 22.14 ships an npm older than 11.5.1; upgrade so `npm publish`
      # can perform the OIDC token exchange and attach provenance.
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Generate the agent skill archive + a bare-version pointer and attach them
      # to the release. Done here (not via GoReleaser hooks) because writing into
      # dist during GoReleaser's own run trips its "dist is not empty" guard, and
      # its after-hooks run too late for extra_files. The CDN sync step below
      # reads both files back out of dist/.
      - name: Package extra release assets
        env:
          TAG: ${{ steps.rel.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          tar -C skills -czf dist/linkai-cli-skill.tar.gz linkai-cli
          # Also ship a .zip of the skill for easy manual download (share the
          # fixed CDN URL with an agent; it unzips to a ready-to-use skill dir).
          ( cd skills && zip -qr ../dist/linkai-cli-skill.zip linkai-cli )
          printf '%s' "${TAG#v}" > dist/latest.txt
          gh release upload "$TAG" \
            dist/linkai-cli-skill.tar.gz dist/linkai-cli-skill.zip dist/latest.txt --clobber

      # Publish auth is bootstrap-friendly:
      #   * If the NPM_TOKEN secret is set, authenticate with it and DISABLE
      #     provenance (OIDC is unavailable in token mode). This is needed for
      #     the very FIRST publish, because a Trusted Publisher cannot be
      #     configured on npmjs.com until each package already exists.
      #   * Once every package (main wrapper + each platform sub-package) has a
      #     Trusted Publisher bound to this repo + workflow (release.yml), delete
      #     the NPM_TOKEN secret and this step falls back to token-less OIDC,
      #     which also attaches build provenance automatically.
      - name: Publish to npm
        env:
          RELEASE_VERSION: ${{ steps.rel.outputs.tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_NO_PROVENANCE: ${{ secrets.NPM_TOKEN != '' && '1' || '' }}
        run: node scripts/publish-npm.mjs

      # Mirror release artifacts to the CDN so the install one-liners
      # (cdn.link-ai.tech/cli/...) serve binaries, checksums, the skill archive,
      # install scripts and latest.txt. Skipped automatically when CDN secrets
      # are not configured, so releases still work before the CDN is set up.
      - name: Sync artifacts to CDN
        if: ${{ env.CDN_SECRET_ID != '' }}
        env:
          RELEASE_VERSION: ${{ steps.rel.outputs.tag }}
        run: bash scripts/sync-cdn.sh
